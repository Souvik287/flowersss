<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Background</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: black;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 2px;
      position: absolute;
      z-index: 2;
      text-align: center;
      pointer-events: none;
      animation: glow 2s infinite alternate;
    }

    #flower-container {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .flower {
      position: absolute;
      transform: translate(-50%, -50%);
      animation:
        bloom 1s ease-out forwards,
        floatAround 8s linear infinite;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
    }

    @keyframes bloom {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes floatAround {
      0% {
        transform: translate(-50%, -50%) rotate(0deg) translateX(20px) rotate(0deg);
      }

      25% {
        transform: translate(-50%, -50%) rotate(90deg) translateX(20px) rotate(-90deg);
      }

      50% {
        transform: translate(-50%, -50%) rotate(180deg) translateX(20px) rotate(-180deg);
      }

      75% {
        transform: translate(-50%, -50%) rotate(270deg) translateX(20px) rotate(-270deg);
      }

      100% {
        transform: translate(-50%, -50%) rotate(360deg) translateX(20px) rotate(-360deg);
      }
    }

      

    @keyframes glow {
      from {
        text-shadow: 0 0 10px white;
      }

      to {
        text-shadow: 0 0 25px pink;
      }
    }
  </style>
</head>
<body>

  <div id="flower-container"></div>

  

  <script>
    const container = document.getElementById("flower-container");

    document.addEventListener("click", (e) => {
      const flower = document.createElement("div");
      flower.classList.add("flower");

      const flowers = ["🌸", "🌺", "🌷", "🌹", "💐"];
      flower.innerText = flowers[Math.floor(Math.random() * flowers.length)];

      flower.style.left = `${e.clientX}px`;
      flower.style.top = `${e.clientY}px`;

      const size = Math.random() * 30 + 25;
      flower.style.fontSize = `${size}px`;

      container.appendChild(flower);

      
    });

    console.log("Interactive flower page loaded");
  </script>

</body>
</html>
